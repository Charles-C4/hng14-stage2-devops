name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_LOWER: ${{ github.repository }}
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: pip install flake8

      - run: flake8 api/ worker/ --max-line-length=120 --ignore=E501,W503 || echo "Lint warnings"

      - run: |
          wget -O /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - run: hadolint api/Dockerfile worker/Dockerfile frontend/Dockerfile || echo "Docker warnings"

      - run: npm install -g eslint

      - working-directory: ./frontend
        run: |
          npm install
          npx eslint app.js || true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pytest pytest-cov redis fakeredis requests httpx

      - run: |
          cd api
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=term
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-api:${{ github.sha }}

      - uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-worker:${{ github.sha }}

      - uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-frontend:${{ github.sha }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif

      - uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-api:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-worker:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-frontend:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 0

      - uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-api:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-worker:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-frontend:${{ github.sha }}
          severity: CRITICAL
          exit-code: 1

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - run: pip install requests redis

      - run: |
          export API_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-api:${{ github.sha }}
          export WORKER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-worker:${{ github.sha }}
          export FRONTEND_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-frontend:${{ github.sha }}

          cat > docker-compose.override.yml << EOF
          services:
            api:
              image: \$API_IMAGE
              build:
            worker:
              image: \$WORKER_IMAGE
              build:
            frontend:
              image: \$FRONTEND_IMAGE
              build:
          EOF

          docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
          sleep 30

      - run: |
          python3 << 'EOF'
          import requests, time, sys

          r = requests.post("http://localhost:3000/submit")
          job_id = r.json()["job_id"]

          for _ in range(30):
              res = requests.get(f"http://localhost:3000/status/{job_id}")
              if res.json()["status"] == "completed":
                  print("SUCCESS")
                  sys.exit(0)
              time.sleep(2)

          sys.exit(1)
          EOF

      - if: always()
        run: docker compose down

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-api:${{ github.sha }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-api:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-api:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-api:latest

          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-worker:${{ github.sha }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-worker:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-worker:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-worker:latest

          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-frontend:${{ github.sha }}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-frontend:${{ github.sha }} ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-frontend:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_LOWER }}-frontend:latest