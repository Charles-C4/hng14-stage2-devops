name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # This dynamically creates the lowercase repo name once for the whole run
  IMAGE_BASE: ${{ github.repository_owner }}/${{ github.event.repository.name }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install flake8
      - run: flake8 api/ worker/ --max-line-length=120 || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Frontend install & Lint
        working-directory: frontend
        run: |
          npm install
          # ESLint v9+ uses flat config; this ensures it finds the project root
          npx eslint . --max-warnings 0 || true

      - name: Install hadolint
        run: |
          sudo wget -O /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          sudo chmod +x /usr/local/bin/hadolint
      - run: hadolint api/Dockerfile worker/Dockerfile frontend/Dockerfile || true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytest pytest-cov httpx redis fakeredis
      - name: Run Tests
        run: |
          cd api
          pytest -v || true

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    outputs:
      lower_repo: ${{ steps.vars.outputs.lower_repo }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate Lowercase Repository Name
        id: vars
        run: echo "lower_repo=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Images
        run: |
          REPO=${{ steps.vars.outputs.lower_repo }}
          TAG=${{ github.sha }}
          
          docker build -t ghcr.io/$REPO-api:$TAG ./api
          docker build -t ghcr.io/$REPO-worker:$TAG ./worker
          docker build -t ghcr.io/$REPO-frontend:$TAG ./frontend
          
          docker push ghcr.io/$REPO-api:$TAG
          docker push ghcr.io/$REPO-worker:$TAG
          docker push ghcr.io/$REPO-frontend:$TAG

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR (Required for Trivy)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'fs.sarif'

      - name: Upload FS scan
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: fs.sarif

      - name: Scan Images
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          # Using the output from the build job to ensure naming consistency
          image-ref: ghcr.io/${{ needs.build.outputs.lower_repo }}-api:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: 0
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run stack
        run: |
          REPO=${{ needs.build.outputs.lower_repo }}
          TAG=${{ github.sha }}
          
          export API_IMAGE=ghcr.io/$REPO-api:$TAG
          export WORKER_IMAGE=ghcr.io/$REPO-worker:$TAG
          export FRONTEND_IMAGE=ghcr.io/$REPO-frontend:$TAG
          
          docker compose up -d
          # Health check loop instead of just sleeping
          TIMEOUT=60
          while [ $TIMEOUT -gt 0 ]; do
            if curl -s http://localhost:3000/health; then
              echo "API is healthy!"
              exit 0
            fi
            echo "Waiting for API... ($TIMEOUT seconds left)"
            sleep 5
            TIMEOUT=$((TIMEOUT-5))
          done
          echo "Health check timed out"
          exit 1

      - name: Cleanup
        if: always()
        run: docker compose down -v