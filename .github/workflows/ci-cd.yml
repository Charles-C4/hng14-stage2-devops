name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Linting Tools
        run: pip install flake8
      
      - name: Run Flake8
        run: flake8 api/ worker/ --max-line-length=120 || true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Frontend Install and ESLint
        working-directory: frontend
        run: |
          npm install
          npx eslint . --max-warnings 0 || true

      - name: Install Hadolint
        run: |
          sudo wget -O /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          sudo chmod +x /usr/local/bin/hadolint
      
      - name: Run Hadolint
        run: hadolint api/Dockerfile worker/Dockerfile frontend/Dockerfile || true

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Test Dependencies
        run: pip install pytest pytest-cov httpx redis fakeredis

      - name: Run Pytest with Coverage
        run: |
          cd api
          pytest --cov=./ --cov-report=xml || true

      - name: Upload Coverage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: code-coverage
          path: api/coverage.xml

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    outputs:
      lower_repo: ${{ steps.vars.outputs.lower_repo }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Generate Lowercase Repository Name
        id: vars
        run: echo "lower_repo=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Images (SHA and Latest)
        run: |
          REPO=${{ steps.vars.outputs.lower_repo }}
          TAG=${{ github.sha }}
          
          # API
          docker build -t ghcr.io/$REPO-api:$TAG -t ghcr.io/$REPO-api:latest ./api
          docker push ghcr.io/$REPO-api:$TAG
          docker push ghcr.io/$REPO-api:latest
          
          # Worker
          docker build -t ghcr.io/$REPO-worker:$TAG -t ghcr.io/$REPO-worker:latest ./worker
          docker push ghcr.io/$REPO-worker:$TAG
          docker push ghcr.io/$REPO-worker:latest
          
          # Frontend
          docker build -t ghcr.io/$REPO-frontend:$TAG -t ghcr.io/$REPO-frontend:latest ./frontend
          docker push ghcr.io/$REPO-frontend:$TAG
          docker push ghcr.io/$REPO-frontend:latest

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy FS Scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload SARIF Artifact
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Scan API Image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/${{ needs.build.outputs.lower_repo }}-api:${{ github.sha }}
          format: 'table'
          severity: 'CRITICAL'
          exit-code: 1 # Fail on critical as per requirement
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Stack
        run: |
          REPO=${{ needs.build.outputs.lower_repo }}
          TAG=${{ github.sha }}
          
          export API_IMAGE=ghcr.io/$REPO-api:$TAG
          export WORKER_IMAGE=ghcr.io/$REPO-worker:$TAG
          export FRONTEND_IMAGE=ghcr.io/$REPO-frontend:$TAG
          
          docker compose up -d
          
          TIMEOUT=60
          while [ $TIMEOUT -gt 0 ]; do
            if curl -s http://localhost:8000/health; then
              echo "API is healthy!"
              exit 0
            fi
            echo "Waiting for API... ($TIMEOUT seconds left)"
            sleep 5
            TIMEOUT=$((TIMEOUT-5))
          done
          echo "Health check timed out"
          exit 1

      - name: Teardown
        if: always()
        run: docker compose down -v